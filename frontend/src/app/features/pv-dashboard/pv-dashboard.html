<section class="pv">
  <h1>Theoretical vs actual PV</h1>
  <p class="sub" *ngIf="metLabel()">{{ metLabel() }}</p>
  <p class="totals" *ngIf="dailyTotalsLabel()">{{ dailyTotalsLabel() }}</p>
  <p class="totals excess" *ngIf="excessTotalsLabel()">{{ excessTotalsLabel() }}</p>

  <div class="controls">
    <div class="date-stepper">
      <label class="date-stepper-label">
        <span>Date</span>
        <span class="date-stepper-row">
          <button
            type="button"
            class="step-btn"
            (click)="shiftDay(-1)"
            [disabled]="loading()"
            aria-label="Previous day">
            ←
          </button>
          <input
            type="date"
            [ngModel]="dateIso()"
            (ngModelChange)="onDateIso($event)"
            aria-label="Calendar date" />
          <button
            type="button"
            class="step-btn"
            (click)="shiftDay(1)"
            [disabled]="loading()"
            aria-label="Next day">
            →
          </button>
        </span>
      </label>
    </div>

    <label class="threshold">
      <span>Inverter threshold: {{ thresholdKw().toFixed(1) }} kW</span>
      <input
        type="range"
        min="0"
        [max]="sliderMaxKw()"
        step="0.1"
        [ngModel]="thresholdKw()"
        (ngModelChange)="onThreshold($event)"
        [disabled]="loading()"
        aria-label="Inverter power threshold (kW)" />
    </label>

    <span *ngIf="loading()" class="status">Loading…</span>
  </div>

  <p *ngIf="error()" class="error">{{ error() }}</p>
  <p *ngIf="foxessBanner()" class="banner">{{ foxessBanner() }}</p>
  <p *ngIf="forecastBanner()" class="banner">{{ forecastBanner() }}</p>

  <div class="chart-wrap" *ngIf="graphData().length">
    <plotly-plot
      [data]="graphData()"
      [layout]="graphLayout()"
      [useResizeHandler]="true"
      [style]="{ position: 'relative', width: '100%', height: '460px' }"
    />
  </div>
</section>
